version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/queries.sql"
    schema: "migrations"
    gen:
      go:
        package: "db"
        out: "internal/store/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_pointers_for_null_types: true
        overrides:
          # uuid → google/uuid.UUID(Stage 2 已经加过)
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"

          # timestamptz NOT NULL → time.Time
          - db_type: "timestamptz"
            go_type: "time.Time"

          # timestamptz NULL → *time.Time(用于 last_seen_at、heartbeat_at 等可空列)
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
