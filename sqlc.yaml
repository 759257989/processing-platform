version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/queries.sql"
    schema: "migrations"
    gen:
      go:
        package: "db"
        out: "internal/store/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_pointers_for_null_types: true
        overrides:
          # Map Postgres uuid columns to google/uuid.UUID
          # instead of the default pgtype.UUID. Keeps types consistent
          # between handlers (which generate UUIDs with uuid.New()) and
          # the DB layer.
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
