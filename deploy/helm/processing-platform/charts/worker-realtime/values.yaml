image:
  repository: processing-platform/worker-realtime
  tag: "dev"
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  POSTGRES_DSN: "postgres://postgres:localdev@pp-postgresql:5432/platform?sslmode=disable"
  KAFKA_BROKERS: "pp-kafka-controller-headless:9092"
