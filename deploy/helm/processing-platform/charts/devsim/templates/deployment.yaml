apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsim
  labels:
    app: devsim
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: devsim
  template:
    metadata:
      labels:
        app: devsim
    spec:
      containers:
        - name: devsim
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 9090
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}