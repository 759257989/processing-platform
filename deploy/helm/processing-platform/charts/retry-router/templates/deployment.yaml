apiVersion: apps/v1
kind: Deployment
metadata:
  name: retry-router
  labels:
    app: retry-router
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: retry-router
  template:
    metadata:
      labels:
        app: retry-router
    spec:
      containers:
        - name: retry-router
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
