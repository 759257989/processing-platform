image:
  repository: processing-platform/ingestion
  tag: "dev"
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  KAFKA_BROKERS: "pp-kafka-controller-headless:9092"
  MQTT_BROKER: "tcp://mosquitto:1883"
