apiVersion: v2
name: processing-platform
description: |
  Multi-tier IoT/edge processing platform with REST + MQTT ingestion,
  per-tier Kafka topics, autoscaling workers, and a reaper supervisor.
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: postgresql
    version: 15.5.16
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: redis
    version: 19.5.5
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

  - name: kafka
    version: 29.3.4
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled

  - name: minio
    version: 14.6.5
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled

  - name: mosquitto
    version: 0.1.0
    repository: "file://./charts/mosquitto"   # local subchart we write in Step 10
    condition: mosquitto.enabled
  
  - name: api
    version: 0.1.0
    repository: "file://./charts/api"
    condition: api.enabled

  - name: worker-standard
    version: 0.1.0
    repository: "file://./charts/worker-standard"
    condition: worker-standard.enabled
  
  - name: worker-realtime
    version: 0.1.0
    repository: "file://./charts/worker-realtime"
    condition: worker-realtime.enabled

  - name: worker-bulk
    version: 0.1.0
    repository: "file://./charts/worker-bulk"
    condition: worker-bulk.enabled

  - name: retry-router
    version: 0.1.0
    repository: "file://./charts/retry-router"
    condition: retry-router.enabled

  - name: reaper
    version: 0.1.0
    repository: "file://./charts/reaper"
    condition: reaper.enabled

  - name: ingestion
    version: 0.1.0
    repository: "file://./charts/ingestion"
    condition: ingestion.enabled

  - name: mock-device
    version: 0.1.0
    repository: "file://./charts/mock-device"
    condition: mock-device.enabled

  - name: mock-webhook
    version: 0.1.0
    repository: "file://./charts/mock-webhook"
    condition: mock-webhook.enabled
  
  - name: kube-prometheus-stack
    version: 58.2.1                                   # 装时锁定，避免不可控升级
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled

  - name: loki-stack
    version: 2.10.2
    repository: https://grafana.github.io/helm-charts
    condition: loki-stack.enabled

  - name: tempo
    version: 1.10.1
    repository: https://grafana.github.io/helm-charts
    condition: tempo.enabled
  - name: kafka-lag-exporter
    version: 0.1.0
    repository: "file://./charts/kafka-lag-exporter"
    condition: kafka-lag-exporter.enabled

  - name: prometheus-adapter
    version: 5.3.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus-adapter.enabled

  - name: devsim
    version: 0.1.0
    repository: "file://./charts/devsim"
    condition: devsim.enabled