# Grafana dashboards loaded as ConfigMaps.
#
# How discovery works: kube-prometheus-stack runs a "grafana-sidecar" pod
# alongside Grafana. The sidecar watches for ConfigMaps with the label
# `grafana_dashboard: "1"` cluster-wide, reads each ConfigMap's data, and
# writes the JSON files into Grafana's provisioning dir — which then
# auto-loads them. No Grafana restart needed.
#
# We keep dashboard JSON in dashboards/*.json (committed to git, version
# controlled) and pull them in here via $.Files.Get. Editing in the UI
# still works but won't persist across pod restarts unless you copy
# Settings → JSON Model back into the file.
{{- range $name := list "operator" "engineer" "capacity" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-{{ $name }}
  labels:
    grafana_dashboard: "1"                            # 关键：sidecar selector
    app.kubernetes.io/part-of: processing-platform
data:
  {{ $name }}.json: |-
{{ $.Files.Get (printf "dashboards/%s.json" $name) | indent 4 }}
{{- end }}
